<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis & Environment Dashboard</title>
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for standard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="theme-toggle-container">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </div>
        </label>
    </div>

    <div class="dashboard-container glow-effect">
        <header>
            <div class="header-icon-wrapper">
                <i class="fas fa-leaf header-icon pulsing-icon"></i>
            </div>
            <h1>Environment Analytics</h1>
            <p>Real-time city air quality and climate monitoring</p>
        </header>

        <!-- Dynamic Alert Banner for AQI -->
        <div id="alertBanner" class="alert-banner loading alert-entrance">
            <span id="alertIcon" class="bounce-icon">⏳</span>
            <span id="alertText">Fetching latest environment data...</span>
        </div>

        <section class="main-content">
            <!-- AQI Metrics -->
            <div class="metrics-grid">
                <div class="metric-card interactive-card">
                    <div class="card-header">
                        <i class="fas fa-wind card-icon color-blue"></i>
                        <div class="metric-title">Average AQI</div>
                    </div>
                    <div class="metric-value">
                        <span id="avgAQI">--</span>
                        <span class="unit">Index</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="avgAqiProgress"
                            style="width: 0%; background-color: var(--primary);"></div>
                    </div>
                    <div class="metric-sparkline">Overall air quality trend</div>
                </div>

                <div class="metric-card interactive-card">
                    <div class="card-header">
                        <i class="fas fa-arrow-up card-icon color-red"></i>
                        <div class="metric-title">Maximum AQI</div>
                    </div>
                    <div class="metric-value">
                        <span id="maxAQI">--</span>
                    </div>
                    <div class="metric-sparkline warning-text">Peak pollution level recorded</div>
                </div>

                <div class="metric-card interactive-card">
                    <div class="card-header">
                        <i class="fas fa-arrow-down card-icon color-green"></i>
                        <div class="metric-title">Minimum AQI</div>
                    </div>
                    <div class="metric-value">
                        <span id="minAQI">--</span>
                    </div>
                    <div class="metric-sparkline success-text">Cleanest recorded value</div>
                </div>
            </div>

            <!-- Temperature Analysis Section -->
            <div class="temperature-section">
                <div class="temp-card glass-card">
                    <div class="temp-visual">
                        <svg class="circular-chart" viewBox="0 0 36 36">
                            <path class="circle-bg" d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" id="tempCircle" stroke-dasharray="0, 100" d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="20.35" class="percentage" id="avgTempText">--°</text>
                        </svg>
                    </div>
                    <div class="temp-info">
                        <h2>Current Climate</h2>
                        <h3 id="tempAnalysisTitle">Analysis Pending</h3>
                        <p id="tempAnalysisText" class="dynamic-analysis">Awaiting data...</p>
                    </div>
                </div>
            </div>
        </section>

        <button id="refreshBtn" class="refresh-btn premium-button">
            <span class="btn-text">Refresh Data</span>
            <i class="fas fa-sync-alt refresh-icon"></i>
            <div class="btn-glow"></div>
        </button>
    </div>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>

</html>
